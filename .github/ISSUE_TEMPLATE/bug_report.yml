name: Bug report
description: Something doesn't work the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: if this is a **security** issue, do not use this form.
        See [SECURITY.md](../blob/main/SECURITY.md) for private reporting.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you run, and what did you see?
      placeholder: |
        $ doi-dropbox upload report.pdf
        ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `doi-dropbox --version`
      placeholder: v0.2.0
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: OS and architecture
      placeholder: macOS 15 / arm64
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: |
        Paste any error output. **Redact anything sensitive** — tokens,
        presigned URLs, and your API endpoint should not appear here.
      render: shell

version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    # Group patch and minor bumps into one PR so the review burden stays sane.
    # Majors arrive separately because they deserve individual attention.
    groups:
      go-dependencies:
        update-types: ["minor", "patch"]

  # GitHub Actions themselves. Pinned actions go stale and accumulate
  # vulnerabilities just like libraries do.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
